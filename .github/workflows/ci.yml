name: CI Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: app/package-lock.json

    - name: Install Dependencies
      run: |
        cd app
        npm ci

    - name: Run Build Check
      run: |
        cd app
        npm run build